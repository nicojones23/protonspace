<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ProtonSpace</title><style>:root{--bg:#08020d;--panel:#15071f;--alt:#210b30;--text:#f7efff;--muted:#b6a6c5;--purple:#a642ff;--cyan:#47efff;--border:#643080}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#321047,#08020d 55%);color:var(--text);font:14px Verdana,Arial,sans-serif}.wrap{max-width:1080px;margin:auto;padding:24px}.bar,.panel{background:rgba(21,7,31,.94);border:2px solid var(--border);border-radius:3px}.bar{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}.logo{font-size:24px;font-weight:bold}.logo b{color:var(--cyan)}a{color:var(--cyan)}button{background:var(--alt);color:var(--text);border:1px solid var(--border);padding:9px 14px;border-radius:2px;cursor:pointer}button:hover{border-color:var(--cyan)}.grid{display:grid;grid-template-columns:190px 1fr 230px;gap:14px;margin-top:14px}.panel{padding:14px}.nav button{display:block;width:100%;text-align:left;margin-bottom:7px}.nav .active{border-color:var(--cyan)}h1,h2,h3{margin-top:0}.muted{color:var(--muted);font-size:12px}.composer textarea{width:100%;min-height:90px;background:#0b0310;color:var(--text);border:1px solid var(--border);padding:10px}.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}.post{border-top:1px solid var(--border);padding:14px 0}.post:first-child{border-top:0}.author{font-weight:bold}.content{line-height:1.55;margin:10px 0}.tag{color:var(--cyan);font-size:12px}.status{color:var(--cyan);min-height:18px;font-size:12px}.trend{padding:10px 0;border-top:1px solid var(--border)}@media(max-width:800px){.grid{grid-template-columns:1fr}.nav{display:flex;gap:7px}.nav button{display:inline-block;width:auto}.right{display:none}}</style></head><body><div class="wrap"><header class="bar"><div><div class="logo">Proton<b>Space</b></div><span class="muted">The social layer of Most Hated</span></div><button id="login">Sign in</button></header><div class="grid"><aside class="panel nav"><button class="active">⌂ Home</button><button>⌕ Discover</button><button>♡ Notifications</button><button>✉ Messages</button><hr><span class="muted">Public web platform</span></aside><main><section class="panel composer"><h2>What’s happening?</h2><textarea id="body" maxlength="2000" placeholder="Share something with the city..."></textarea><div class="row"><span class="muted"><span id="count">0</span>/2000</span><button id="publish">Publish</button></div><div class="status" id="status"></div></section><section class="panel" style="margin-top:14px"><h2>City feed</h2><div id="feed" class="muted">Loading ProtonSpace…</div></section></main><aside class="panel right"><h3>Trending</h3><div class="trend"><b>#MostHatedRP</b><br><span class="muted">City conversation</span></div><div class="trend"><b>#CityLife</b><br><span class="muted">People are talking</span></div><div class="trend"><b>#ProtonSpace</b><br><span class="muted">The new social layer</span></div></aside></div><p class="muted" style="text-align:center">ProtonSpace · public web · CityOS identity</p></div><script src="config.js"></script><script>
const cfg=window.PROTONSPACE_CONFIG||{};const api=(cfg.apiBaseUrl||'').replace(/\/$/,'');const feed=document.querySelector('#feed'),status=document.querySelector('#status'),body=document.querySelector('#body');body.oninput=()=>document.querySelector('#count').textContent=body.value.length;function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}async function load(){try{const r=await fetch(api+'/api/feed',{credentials:'include'});if(!r.ok)throw Error('API unavailable');const d=await r.json();feed.innerHTML=(d.posts||[]).map(p=>`<article class="post"><div class="author">${esc(p.displayName||p.username||'Citizen')}</div><div class="muted">${new Date(p.publishedAt).toLocaleString()}</div><div class="content">${esc(p.body)}</div></article>`).join('')||'<p>No posts yet. Start the conversation.</p>'}catch(e){feed.textContent='The public API is not connected yet.'}}document.querySelector('#publish').onclick=async()=>{if(!body.value.trim())return;try{const r=await fetch(api+'/api/posts',{method:'POST',credentials:'include',headers:{'content-type':'application/json'},body:JSON.stringify({body:body.value})});if(!r.ok)throw Error('Sign in required');body.value='';document.querySelector('#count').textContent='0';status.textContent='Published';load()}catch(e){status.textContent=e.message}};document.querySelector('#login').onclick=()=>{status.textContent='External account login will be connected here.'};load();
</script><script>(async()=>{const b=document.querySelector('#login'),a=(window.PROTONSPACE_CONFIG.apiBaseUrl||'').replace(/\/$/,'');try{const r=await fetch(a+'/api/auth/session',{credentials:'include'}),d=await r.json();if(d.authenticated){b.textContent='Sign out';b.onclick=async()=>{await fetch(a+'/api/auth/logout',{method:'POST',credentials:'include'});location.reload()};return}}catch(e){}b.textContent='Sign in';b.onclick=()=>{location.href=a+'/api/auth/discord'}})();</script></body></html>
